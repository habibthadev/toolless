name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Get release version
        id: release
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Check if npm version exists
        id: npm_check
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          if npm view toolless@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published to npm - skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found on npm - will publish"
          fi

      - name: Install dependencies
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm --filter toolless typecheck

      - name: Lint
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm lint

      - name: Build
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm build

      - name: Test
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm test

      - name: Verify package version matches release
        if: steps.npm_check.outputs.exists == 'false'
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/toolless/package.json').version")
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi
          echo "Package version matches release version: $PACKAGE_VERSION"

      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        run: pnpm --filter toolless publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Already on npm**: ${{ steps.npm_check.outputs.exists }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.npm_check.outputs.exists }}" = "true" ]; then
            echo "- **Status**: Skipped (already published)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Published successfully" >> $GITHUB_STEP_SUMMARY
          fi
