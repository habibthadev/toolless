name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter toollessdb typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist artifacts
        run: |
          # Verify toollessdb package dist
          test -f packages/toollessdb/dist/index.js || exit 1
          test -f packages/toollessdb/dist/index.cjs || exit 1
          test -f packages/toollessdb/dist/index.d.ts || exit 1
          test -f packages/toollessdb/dist/cli.js || exit 1
          test -d packages/toollessdb/dist/studio-dist || exit 1
          echo "All dist artifacts verified"

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter docs build

      - name: Verify docs output
        run: |
          test -d apps/docs/dist || exit 1
          test -d apps/docs/dist/client || exit 1
          test -d apps/docs/dist/server || exit 1
          echo "Docs build verified"
